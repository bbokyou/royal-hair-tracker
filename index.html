<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>보키의 뷰쿠 트래커</title>
</head>

<body>

<div class="header">

    <img
        src="assets/bokhee.png"
        id="header-character"
        alt="복희유">

    <div class="header-text">

        <div class="header-title-small">
            복희유의
        </div>

        <div class="header-title">
            로얄 소사이어티 헤쿠 추적기
        </div>

        <div class="header-subtitle">
            Nexon Open API 기반 실시간 시세 추적 -v1.0
        </div>
      <div class="header-last-update">

    <span id="last-update">
        🟢 마지막 조회 : -
    </span>

    <button id="refreshBtn">
        🔄 지금 조회
    </button>

    <button id="enable-sound">
        🔔 알림 OFF
    </button>

</div>

</div>

    </div>

</div>

<div class="price-card">

    <div class="price-title">
        현재 최저가
    </div>

    <div id="lowest-price" class="price-value">
        ...
    </div>

    <div id="price-status" class="price-status">
    </div>
<div class="best-price-box">

    <div class="best-price-title">
        🏆 역대 최저
    </div>

    <div id="best-price" class="best-price-value">
        ...
    </div>

    <div id="best-price-diff" class="best-price-diff">
    </div>

</div>
    <div id="today-range" class="today-range">
    </div>

</div>

<div class="info-card">

    <div class="info-row">
        <span>📦 현재 등록 수</span>
        <span><span id="item-count">...</span>개</span>
    </div>

    <div class="info-row">
        <span>🏷️ 최저가 매물</span>
        <span><span id="lowest-count">...</span>개</span>
    </div>

    <div class="info-row">
        <span>🕒 최초 발견</span>
        <span id="first-seen">...</span>
    </div>

    <div class="info-row">
        <span>⏱️ 유지 시간</span>
        <span id="duration">...</span>
    </div>

</div>

<div class="history-card">

    <div class="history-title">
        📈 가격 변동 로그
    </div>

    <div id="price-history"></div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
