<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Royal Hair Tracker</title>
</head>

<body>

<div class="header">

    <img
        src="assets/bokhee.png"
        id="header-character"
        alt="복희유">

    <div class="header-text">

        <div class="header-title-small">
            복희유의
        </div>

        <div class="header-title">
            로얄 소사이어티 헤쿠 추적기
        </div>

        <div class="header-subtitle">
            Nexon Open API 기반 실시간 시세 추적
        </div>

        <div class="header-version">
            v1.0
        </div>

    </div>

</div>

<p>
    현재 최저가 :
    <span id="lowest-price">...</span>
</p>

<p>
    <span id="price-status"></span>
</p>

<p>현재 등록 수 : <span id="item-count">...</span>개</p>

<p>최저가 매물 수량 : <span id="lowest-count">...</span>개</p>

<p>최저가 최초 발견 시간 : <span id="first-seen">...</span></p>

<p>발견 후 최저가 유지 시간 : <span id="duration">...</span></p>

<button id="enable-sound">🔔최저가 알림 소리 켜기~</button>
<h2>📈 가격 변동 로그</h2>

<div id="price-history"></div>

<script src="script.js"></script>

</body>
</html>
